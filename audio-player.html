<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>学習プレイヤー</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.15);
    --text: #e8e8f0;
    --text-sub: #7a7a9a;
    --border: #2a2a38;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 0;
  }

  .header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .app-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-sub);
  }

  /* File drop zone */
  .drop-zone {
    width: 100%;
    max-width: 420px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-zone.has-file {
    border-style: solid;
    border-color: var(--border);
    border-width: 1px;
    padding: 8px 14px;
    flex-direction: row;
    gap: 8px;
    justify-content: center;
  }

  .drop-icon {
    font-size: 36px;
    line-height: 1;
  }

  .drop-zone.has-file .drop-icon {
    font-size: 14px;
  }

  .drop-label {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .drop-sub {
    font-size: 12px;
    color: var(--text-sub);
  }

  .file-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sub);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  #file-input { display: none; }

  /* Player */
  .player {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .player.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .progress-bar-track {
    width: 100%;
    height: 44px; /* タップ領域を広く */
    background: transparent;
    position: relative;
    cursor: pointer;
    touch-action: none;
    display: flex;
    align-items: center;
  }

  /* 見た目のバー */
  .progress-bar-track::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
  }

  .progress-bar-fill {
    position: absolute;
    left: 0;
    height: 8px;
    background: var(--accent);
    border-radius: 4px;
    width: 0%;
    pointer-events: none;
    transition: width 0.08s linear;
  }

  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 50%;
    left: 0%;
    pointer-events: none;
    box-shadow: 0 0 0 4px rgba(79,142,247,0.25);
    transition: left 0.08s linear;
  }

  .progress-bar-track.dragging .progress-thumb {
    width: 28px;
    height: 28px;
    box-shadow: 0 0 0 6px rgba(79,142,247,0.3);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-sub);
    font-variant-numeric: tabular-nums;
  }

  /* Main controls */
  .controls-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active { background: var(--surface2); }

  .btn-seek {
    width: 64px;
    height: 64px;
    font-size: 20px;
  }

  .btn-seek span {
    font-size: 10px;
    color: var(--text-sub);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .btn-play {
    width: 72px;
    height: 72px;
    background: var(--accent);
    border-color: var(--accent);
    border-radius: 50%;
    font-size: 28px;
  }

  .btn-play:active { background: #3a7ae0; border-color: #3a7ae0; }

  /* Secondary controls */
  .controls-secondary {
    display: flex;
    gap: 10px;
  }

  .pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }

  .pill.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .pill-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: inherit;
  }

  .pill-value {
    font-size: 15px;
    font-weight: 700;
    color: inherit;
  }

  /* Speed selector (legacy panel hidden) */
  .speed-panel { display: none !important; }
  .speed-panel-label { display: none; }

  /* Sleep timer panel */
  .sleep-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }

  .sleep-panel.open { display: flex; }

  .sleep-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .sleep-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .sleep-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .sleep-remaining {
    text-align: center;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    display: none;
  }

  .sleep-remaining.visible { display: block; }

  /* Current line display */
  .lyric-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  .lyric-text {
    font-size: 24px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .lyric-text.placeholder {
    color: var(--text-sub);
    font-size: 15px;
    font-weight: 400;
  }

  /* URL input */
  .url-section {
    width: 100%;
    max-width: 420px;
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .url-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-sub);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }

  .url-divider::before,
  .url-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .url-input-row {
    display: flex;
    gap: 8px;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input::placeholder {
    color: var(--text-sub);
  }

  .url-input:focus {
    border-color: var(--accent);
  }

  .url-load-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .url-load-btn:active { background: #3a7ae0; }

  .url-hint {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.5;
  }

  /* Speed slider (replaces speed-panel grid) */
  .speed-slider-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .speed-slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .speed-slider-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-sub);
  }

  .speed-slider-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  input[type=range].speed-range {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) 33%, var(--surface2) 33%);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type=range].speed-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .speed-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-sub);
    padding: 0 2px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="app-title">学習プレイヤー</span>
</div>

<!-- File picker -->
<div class="drop-zone" id="drop-zone">
  <div class="drop-icon">🎧</div>
  <div class="drop-label">ファイルを選択</div>
  <div class="drop-sub">WAV / MP3 対応</div>
  <input type="file" id="file-input" accept=".wav,.mp3,audio/wav,audio/mpeg">
</div>

<!-- URL input section -->
<div class="url-section">
  <div class="url-divider">または URL で読み込む</div>
  <div class="url-input-row">
    <input class="url-input" id="url-input" type="url"
           placeholder="Google Drive / Dropbox の共有URLを貼り付け">
    <button class="url-load-btn" id="url-load-btn">読み込む</button>
  </div>
  <div class="url-hint" id="url-hint">
    Google Drive: 共有リンクの「表示」→「リンクをコピー」で取得できます
  </div>
</div>

<audio id="audio"></audio>

<!-- Player UI -->
<div class="player" id="player">

  <!-- Current lyric -->
  <div class="lyric-box" id="lyric-box">
    <span class="lyric-text placeholder" id="lyric-text">再生すると表示されます</span>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-bar-track" id="progress-track">
      <div class="progress-bar-fill" id="progress-fill"></div>
      <div class="progress-thumb" id="progress-thumb"></div>
    </div>
    <div class="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <!-- Main controls: seek back / play / seek forward -->
  <div class="controls-main">
    <button class="btn btn-seek" id="btn-back10" aria-label="10秒戻す">
      ↩ <span>10秒</span>
    </button>
    <button class="btn btn-seek" id="btn-back5" aria-label="5秒戻す">
      ↩ <span>5秒</span>
    </button>
    <button class="btn btn-play" id="btn-play" aria-label="再生/一時停止">▶</button>
    <button class="btn btn-seek" id="btn-fwd5" aria-label="5秒進む">
      ↪ <span>5秒</span>
    </button>
    <button class="btn btn-seek" id="btn-fwd10" aria-label="10秒進む">
      ↪ <span>10秒</span>
    </button>
  </div>

  <!-- Secondary: speed / loop / sleep -->
  <div class="controls-secondary">
    <div class="pill" id="pill-speed">
      <span class="pill-label">速度</span>
      <span class="pill-value" id="speed-label">1.0×</span>
    </div>
    <div class="pill" id="pill-loop">
      <span class="pill-label">ループ</span>
      <span class="pill-value">🔁</span>
    </div>
    <div class="pill" id="pill-sleep">
      <span class="pill-label">タイマー</span>
      <span class="pill-value">💤</span>
    </div>
  </div>

  <!-- Speed slider (always visible) -->
  <div class="speed-slider-wrap">
    <div class="speed-slider-header">
      <span class="speed-slider-label">再生速度</span>
      <span class="speed-slider-value" id="speed-slider-val">1.0×</span>
    </div>
    <input type="range" class="speed-range" id="speed-range"
           min="0" max="8" step="1" value="2">
    <div class="speed-ticks">
      <span>0.5×</span><span>0.75×</span><span>1×</span><span>1.25×</span><span>1.5×</span><span>1.75×</span><span>2×</span><span>2.5×</span><span>3×</span>
    </div>
  </div>

  <!-- Sleep timer panel -->
  <div class="sleep-panel" id="sleep-panel">
    <div class="speed-panel-label">スリープタイマー</div>
    <div class="sleep-grid" id="sleep-grid"></div>
    <div class="sleep-remaining" id="sleep-remaining"></div>
  </div>

</div>

<script>
const audio = document.getElementById('audio');
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const player = document.getElementById('player');
const btnPlay = document.getElementById('btn-play');
const progressFill = document.getElementById('progress-fill');
const progressThumb = document.getElementById('progress-thumb');
const progressTrack = document.getElementById('progress-track');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');
const pillSpeed = document.getElementById('pill-speed');
const pillLoop = document.getElementById('pill-loop');
const pillSleep = document.getElementById('pill-sleep');
const speedLabel = document.getElementById('speed-label');
const sleepPanel = document.getElementById('sleep-panel');
const sleepGrid = document.getElementById('sleep-grid');
const sleepRemaining = document.getElementById('sleep-remaining');

let sleepTimer = null;
let sleepEndTime = null;
let sleepInterval = null;
let activeSleepBtn = null;
let isDragging = false;

// ---- URL loading ----
const urlInput = document.getElementById('url-input');
const urlLoadBtn = document.getElementById('url-load-btn');
const urlHint = document.getElementById('url-hint');

function convertToDirectUrl(input) {
  // Google Drive: /file/d/ID/view → direct download
  const gdMatch = input.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (gdMatch) {
    return `https://drive.google.com/uc?export=download&id=${gdMatch[1]}`;
  }
  // Dropbox: ?dl=0 → ?dl=1
  if (input.includes('dropbox.com')) {
    return input.replace(/[?&]dl=0/, '').replace(/[?&]dl=1/, '') + (input.includes('?') ? '&dl=1' : '?dl=1');
  }
  return input;
}

urlLoadBtn.addEventListener('click', () => {
  const raw = urlInput.value.trim();
  if (!raw) return;
  const url = convertToDirectUrl(raw);
  urlHint.textContent = '読み込み中...';
  audio.src = url;
  audio.load();
  audio.addEventListener('loadedmetadata', () => {
    urlHint.textContent = '✅ 読み込み完了';
    player.classList.add('active');
    dropZone.classList.add('has-file');
    dropZone.querySelector('.drop-icon').textContent = '🔗';
    dropZone.querySelector('.drop-label').textContent = '';
    dropZone.querySelector('.drop-sub').textContent = '';
    let nameEl = dropZone.querySelector('.file-name');
    if (!nameEl) {
      nameEl = document.createElement('div');
      nameEl.className = 'file-name';
      dropZone.appendChild(nameEl);
    }
    nameEl.textContent = raw.length > 40 ? raw.slice(0, 40) + '…' : raw;
    setupMediaSession();
  }, { once: true });
  audio.addEventListener('error', () => {
    urlHint.innerHTML = '❌ 読み込めませんでした。<br>Google Driveの場合は「全員が閲覧可」に設定してください。';
  }, { once: true });
});

urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') urlLoadBtn.click();
});

// ---- File handling ----
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  const url = URL.createObjectURL(file);
  audio.src = url;
  audio.load();
  dropZone.classList.add('has-file');
  dropZone.querySelector('.drop-icon').textContent = '🎵';
  dropZone.querySelector('.drop-label').textContent = '';
  dropZone.querySelector('.drop-sub').textContent = '';
  let nameEl = dropZone.querySelector('.file-name');
  if (!nameEl) {
    nameEl = document.createElement('div');
    nameEl.className = 'file-name';
    dropZone.appendChild(nameEl);
  }
  nameEl.textContent = file.name;
  player.classList.add('active');
  setupMediaSession();
}

// ---- Play / pause ----
btnPlay.addEventListener('click', togglePlay);

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

audio.addEventListener('play', () => { btnPlay.textContent = '⏸'; });
audio.addEventListener('pause', () => { btnPlay.textContent = '▶'; });
audio.addEventListener('ended', () => { btnPlay.textContent = '▶'; });

// ---- Seek buttons ----
document.getElementById('btn-back10').addEventListener('click', () => seek(-10));
document.getElementById('btn-back5').addEventListener('click', () => seek(-5));
document.getElementById('btn-fwd5').addEventListener('click', () => seek(5));
document.getElementById('btn-fwd10').addEventListener('click', () => seek(10));

function seek(delta) {
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + delta));
}

// ---- Progress bar ----
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = formatTime(audio.duration);
  updateProgress();
});

function updateProgress() {
  if (isDragging) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeCurrent.textContent = formatTime(audio.currentTime);
}

// Touch/mouse scrubbing
function getSeekRatio(clientX) {
  const rect = progressTrack.getBoundingClientRect();
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

progressTrack.addEventListener('pointerdown', e => {
  isDragging = true;
  progressTrack.classList.add('dragging');
  progressTrack.setPointerCapture(e.pointerId);
  scrubTo(e.clientX);
});
progressTrack.addEventListener('pointermove', e => {
  if (!isDragging) return;
  scrubTo(e.clientX);
});
progressTrack.addEventListener('pointerup', e => {
  if (!isDragging) return;
  isDragging = false;
  progressTrack.classList.remove('dragging');
  scrubTo(e.clientX);
});
progressTrack.addEventListener('pointercancel', () => {
  isDragging = false;
  progressTrack.classList.remove('dragging');
});

function scrubTo(clientX) {
  const ratio = getSeekRatio(clientX);
  const pct = ratio * 100;
  const seekTime = ratio * (audio.duration || 0);
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeCurrent.textContent = formatTime(seekTime);
  // ドラッグ中も即シーク
  if (audio.duration) audio.currentTime = seekTime;
}

// ---- Speed ----
const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0];
let currentSpeed = 1.0;

const speedRange = document.getElementById('speed-range');
const speedSliderVal = document.getElementById('speed-slider-val');

function setSpeed(s) {
  currentSpeed = s;
  audio.playbackRate = s;
  const label = s + '×';
  speedLabel.textContent = label;
  speedSliderVal.textContent = label;
  pillSpeed.classList.toggle('active', s !== 1.0);
  // スライダーのトラック色を更新
  const pct = (speeds.indexOf(s) / (speeds.length - 1)) * 100;
  speedRange.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--surface2) ${pct}%)`;
}

speedRange.addEventListener('input', () => {
  setSpeed(speeds[parseInt(speedRange.value)]);
});

// pill-speed は速度表示のみ（クリック不要）
pillSpeed.style.cursor = 'default';

// ---- Sleep timer ----
const sleepOptions = [5, 10, 15, 20, 30, 45, 60, 90]; // minutes

sleepOptions.forEach(m => {
  const btn = document.createElement('button');
  btn.className = 'sleep-btn';
  btn.textContent = m + '分';
  btn.addEventListener('click', () => setSleep(m, btn));
  sleepGrid.appendChild(btn);
});

function setSleep(minutes, btn) {
  clearSleepTimer();
  if (activeSleepBtn === btn) {
    activeSleepBtn = null;
    pillSleep.classList.remove('active');
    return;
  }
  activeSleepBtn = btn;
  document.querySelectorAll('.sleep-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  pillSleep.classList.add('active');
  sleepEndTime = Date.now() + minutes * 60 * 1000;
  sleepRemaining.classList.add('visible');
  updateSleepDisplay();
  sleepInterval = setInterval(updateSleepDisplay, 1000);
  sleepTimer = setTimeout(() => {
    audio.pause();
    clearSleepTimer();
    pillSleep.classList.remove('active');
  }, minutes * 60 * 1000);
}

function updateSleepDisplay() {
  const ms = sleepEndTime - Date.now();
  if (ms <= 0) { sleepRemaining.textContent = ''; return; }
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  sleepRemaining.textContent = `残り ${m}:${String(s).padStart(2, '0')}`;
}

function clearSleepTimer() {
  clearTimeout(sleepTimer);
  clearInterval(sleepInterval);
  sleepTimer = null;
  sleepInterval = null;
  sleepEndTime = null;
  sleepRemaining.classList.remove('visible');
  sleepRemaining.textContent = '';
  document.querySelectorAll('.sleep-btn').forEach(b => b.classList.remove('active'));
  activeSleepBtn = null;
}

pillSleep.addEventListener('click', () => {
  sleepPanel.classList.toggle('open');
  speedPanel.classList.remove('open');
});

// ---- Media Session API (lock screen / steering wheel) ----
function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: fileInput.files[0]?.name ?? '学習音声',
    artist: '学習プレイヤー',
  });

  const handlers = [
    ['play', () => audio.play()],
    ['pause', () => audio.pause()],
    ['seekbackward',  () => seek(-5)],
    ['seekforward',   () => seek(5)],
    ['previoustrack', () => seek(-5)],
    ['nexttrack',     () => seek(5)],
    ['stop', () => { audio.pause(); audio.currentTime = 0; }],
  ];

  for (const [action, handler] of handlers) {
    try { navigator.mediaSession.setActionHandler(action, handler); } catch {}
  }

  audio.addEventListener('timeupdate', updatePositionState);
  audio.addEventListener('loadedmetadata', updatePositionState);

  function updatePositionState() {
    if (!audio.duration || !isFinite(audio.duration)) return;
    try {
      navigator.mediaSession.setPositionState({
        duration: audio.duration,
        playbackRate: audio.playbackRate,
        position: audio.currentTime,
      });
    } catch {}
  }
}

 {"t": 491.573, "text": "用途ごとに最適なタイプを選ぶのがアーキテクトの仕事なのだ！"}, {"t": 496.491, "text": "【エイエムアイ。AMI。】"}, {"t": 499.189, "text": "EC2を立ち上げるための、OSや設定が全部入った「金型」なのだ。"}, {"t": 506.048, "text": "この金型を使えば、まったく同じ設定のサーバーを、一瞬で何台でも増やせるのだ。"}, {"t": 513.408, "text": "バックアップとしても使える、超重要ワードなのだ！"}, {"t": 517.856, "text": "【オートスケーリング】"}, {"t": 519.531, "text": "アクセスが急増した時にサーバーを自動で増やし、"}, {"t": 523.381, "text": "落ち着いたら自動で減らす機能なのだ。"}, {"t": 526.219, "text": "無駄なコストを削るための必須機能なのだ。"}, {"t": 529.493, "text": "SAAでは、ピークに合わせて最初からたくさんサーバーを用意するのは不正解。"}, {"t": 535.819, "text": "需要に合わせてオートスケーリングさせるのが正解なのだ。"}, {"t": 540.021, "text": "ELBと組み合わせてこそ、真価を発揮するのだー！"}, {"t": 544.587, "text": "【ラムダ。Lambda。】"}, {"t": 546.443, "text": "サーバーを用意しなくてもコードを実行できる、"}, {"t": 549.899, "text": "「サーバーレス」のコンピューティングサービスなのだ！"}, {"t": 553.557, "text": "コードをアップロードするだけで、イベントが起きた時に自動で動くのだ。"}, {"t": 558.997, "text": "例えば「S3に画像がアップされたら、自動でサムネイルを作る」みたいな処理が得意なのだ。"}, {"t": 566.955, "text": "SAAでは「サーバーの管理をしたくない」「使った時間だけ課金したい」という"}, {"t": 573.888, "text": "条件が出たら、Lambdaが正解になるのだー！"}, {"t": 577.728, "text": "【イーシーエスとイーケーエス。ECSとEKS。】"}, {"t": 582.304, "text": "コンテナを動かすためのサービスなのだ。"}, {"t": 585.216, "text": "Dockerコンテナという、アプリをまとめて箱詰めにした技術を"}, {"t": 589.984, "text": "AWS上で管理してくれるのだ。"}, {"t": 593.045, "text": "ECSはAWS独自のコンテナ管理サービスで、比較的シンプルに使えるのだ。"}, {"t": 600.117, "text": "EKSはKubernetesという業界標準の仕組みをAWSで使えるようにしたサービスなのだ。"}, {"t": 607.531, "text": "SAAでは「コンテナを使いたい」という問題でどちらかが登場するのだ。"}, {"t": 613.845, "text": "オンプレでKubernetesを使っていたなら、EKSが正解になるのだー！"}, {"t": 619.605, "text": "【エラスティックビーンズトーク。Elastic Beanstalk。】"}, {"t": 623.936, "text": "アプリのコードをアップロードするだけで、"}, {"t": 626.763, "text": "EC2やELB、オートスケーリングを全部自動でセットアップしてくれるサービスなのだ。"}, {"t": 633.749, "text": "インフラの設定を自分でやりたくない開発者向けの、"}, {"t": 637.856, "text": "おまかせデプロイサービスだと思えばいいのだ。"}, {"t": 641.045, "text": "SAAでは「インフラ管理の手間を省いてアプリを動かしたい」という問題で登場するのだー！"}, {"t": 649.141, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 649.333, "text": "第4章。ストレージとデータベース。"}, {"t": 652.448, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 652.832, "text": "データをどこに保存するか。"}, {"t": 655.019, "text": "用途によって使い分けるのが、アーキテクトの腕の見せ所なのだ！"}, {"t": 660.331, "text": "【エススリー。S3。】"}, {"t": 662.805, "text": "バケット全体の容量は実質無制限で、めちゃくちゃ安くて、"}, {"t": 668.032, "text": "データが消えにくいオブジェクトストレージなのだ！"}, {"t": 671.392, "text": "ただし、1つのファイルの上限は5テラバイトなのだ。"}, {"t": 675.563, "text": "画像ファイルやバックアップデータは、全部ここに入れるのだ。"}, {"t": 680.043, "text": "SAAでは「静的ウェブサイトのホスティング」、つまり"}, {"t": 684.971, "text": "サーバーなしでウェブサイトを公開できる機能がよく問われるのだ！"}, {"t": 689.621, "text": "また、S3のデータをCloudFrontと組み合わせると、"}, {"t": 694.219, "text": "世界中に高速配信できる構成が作れるのだー！"}, {"t": 698.613, "text": "【S3のストレージクラス】"}, {"t": 701.013, "text": "S3にはデータの利用頻度に合わせて、保存コストを下げるクラスが用意されているのだ。"}, {"t": 707.883, "text": "毎日アクセスするデータには「S3スタンダード」を使うのだ。"}, {"t": 713.493, "text": "アクセス頻度が低いデータには「S3スタンダード低頻度アクセス」、"}, {"t": 719.136, "text": "略してS3 Standard-IAが安くなるのだ。"}, {"t": 724.107, "text": "数年間ほぼ触らない長期保管データなら「S3 Glacier」が激安なのだ。"}, {"t": 731.701, "text": "ただしGlacierはデータを取り出すのに数分から数時間かかるのだ。"}, {"t": 736.768, "text": "SAAでは「コストを最適化しながらデータを長期保存したい」という問題で、"}, {"t": 743.36, "text": "このストレージクラスの使い分けが問われるのだー！"}, {"t": 747.093, "text": "【イービーエス。EBS。】"}, {"t": 749.813, "text": "EC2にくっつけて使う、仮想のハードディスクなのだ。"}, {"t": 754.272, "text": "OSを入れたり、頻繁に読み書きするデータを入れる場所なのだ。"}, {"t": 759.264, "text": "SAAで注意が必要なポイントは「DeleteOnTermination」フラグなのだ。"}, {"t": 765.792, "text": "デフォルトでは、ルートボリュームはEC2を削除すると一緒に消えてしまうのだ！"}, {"t": 771.787, "text": "データ用に追加したボリュームはデフォルトで残るけれど、"}, {"t": 775.808, "text": "ルートボリュームは設定を変えないと消えることを、しっかり覚えておくのだー！"}, {"t": 781.739, "text": "【イーエフエス。EFS。】"}, {"t": 784.523, "text": "複数のEC2から同時に読み書きできる、共有ファイルストレージなのだ。"}, {"t": 790.411, "text": "EBSは1台のEC2にしかくっつけられないけれど、"}, {"t": 794.933, "text": "EFSは複数のEC2が同じファイルを同時に使えるのだ。"}, {"t": 800.096, "text": "複数のサーバーで同じコンテンツを共有したいウェブサービスや、"}, {"t": 804.885, "text": "共有ストレージが必要なシステムに向いているのだ。"}, {"t": 808.768, "text": "SAAでは「複数のEC2インスタンスで同じファイルを共有したい」という"}, {"t": 815.531, "text": "問題の正解がEFSになるのだー！"}, {"t": 818.933, "text": "【アールディーエス。RDS。】"}, {"t": 821.867, "text": "AWSが代わりに面倒を見てくれる、マネージドなリレーショナルデータベースなのだ！"}, {"t": 828.533, "text": "MySQLとかPostgreSQLが使えるのだ。"}, {"t": 832.683, "text": "SAAでは2つの機能の違いが超重要なのだ。"}, {"t": 837.035, "text": "1つ目が「マルチAZ」なのだ。"}, {"t": 840.395, "text": "これは障害が起きた時に、自動で予備のデータベースに切り替わる、"}, {"t": 845.696, "text": "可用性向上のための機能なのだ。"}, {"t": 848.576, "text": "読み取りの高速化には使えないことを覚えておくのだ！"}, {"t": 852.917, "text": "2つ目が「リードレプリカ」なのだ。"}, {"t": 856.235, "text": "こちらは読み取り専用のデータベースのコピーを作って、"}, {"t": 860.469, "text": "読み取りの負荷を分散させる機能なのだ。"}, {"t": 863.637, "text": "SAAでは「読み取りが遅い」という問題の正解は、リードレプリカなのだー！"}, {"t": 870.72, "text": "【オーロラ。Aurora。】"}, {"t": 872.501, "text": "AWSが独自に開発した、超高性能なリレーショナルデータベースなのだ。"}, {"t": 878.944, "text": "MySQLやPostgreSQLと互換性があるから、移行もしやすいのだ。"}, {"t": 885.205, "text": "通常のRDSより最大5倍高速で、ストレージが自動で拡張されるのが強みなのだ。"}, {"t": 892.693, "text": "また、最大15台のリードレプリカを持てて、"}, {"t": 896.597, "text": "マルチAZも自動で対応しているのだ。"}, {"t": 899.947, "text": "SAAでは「高性能・高可用性なリレーショナルDBが必要」という問題で"}, {"t": 907.307, "text": "Auroraが正解になるのだー！"}, {"t": 909.728, "text": "【ダイナモディービー。DynamoDB。】"}, {"t": 912.971, "text": "AWS独自の、めちゃくちゃ速いNoSQLデータベースなのだ。"}, {"t": 918.571, "text": "データ構造が柔軟で、アクセスが爆発しても遅延しないのが強みなのだ。"}, {"t": 924.587, "text": "SAAでは、ミリ秒単位の応答が必要なシステムなら、DynamoDBが正解なのだ。"}, {"t": 932.011, "text": "さらに超高速が必要な場合は、DynamoDBの前にキャッシュを置く"}, {"t": 937.696, "text": "「ダックス。DAX。」というサービスが正解になるのだ。"}, {"t": 942.816, "text": "DynamoDBはミリ秒、DAXはマイクロ秒、この使い分けが試験に出るのだー！"}, {"t": 950.229, "text": "【エラスティキャッシュ。ElastiCache。】"}, {"t": 953.28, "text": "データベースへのアクセスを減らすための、高速キャッシュサービスなのだ。"}, {"t": 958.453, "text": "よくアクセスされるデータをメモリ上に保存しておいて、"}, {"t": 962.368, "text": "データベースに問い合わせることなく爆速で返せるのだ。"}, {"t": 966.549, "text": "エンジンは「Redis」と「Memcached」の2種類があるのだ。"}, {"t": 972.256, "text": "Redisはデータの永続化や、マルチAZに対応していて高機能なのだ。"}, {"t": 978.24, "text": "Memcachedはシンプルで、水平スケールが得意なのだ。"}, {"t": 982.731, "text": "SAAでは「RDSへの読み取り負荷が高い」という問題で、"}, {"t": 988.661, "text": "ElastiCacheが正解になるのだー！"}, {"t": 991.563, "text": "【クラウドフロント。CloudFront。】"}, {"t": 994.731, "text": "世界中のエッジロケーションを使って、コンテンツを高速配信するCDNサービスなのだ！"}, {"t": 1001.888, "text": "日本のユーザーへの配信は東京のエッジから、"}, {"t": 1005.579, "text": "アメリカのユーザーへはニューヨークのエッジから届けることで、"}, {"t": 1009.824, "text": "どこにいても速く表示されるのだ。"}, {"t": 1012.512, "text": "S3やEC2のコンテンツをCloudFrontの前に置くのが基本構成なのだ。"}, {"t": 1018.976, "text": "SAAでは「グローバルに低レイテンシーで配信したい」という問題の答えが"}, {"t": 1025.525, "text": "CloudFrontになるのだー！"}, {"t": 1028.085, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1028.277, "text": "第5章。疎結合とメッセージング。"}, {"t": 1031.381, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1031.765, "text": "システムの部品同士を、直接つながずに独立させる設計のことを"}, {"t": 1037.365, "text": "「疎結合」と言うのだ。"}, {"t": 1039.509, "text": "SAAでは、疎結合アーキテクチャを実現するサービスが超頻出なのだ！"}, {"t": 1045.824, "text": "【エスキューエス。SQS。】"}, {"t": 1048.587, "text": "サービスとサービスの間に置く、メッセージのキューなのだ。"}, {"t": 1053.141, "text": "「注文を受け付けるシステム」と「注文を処理するシステム」を"}, {"t": 1059.168, "text": "直接つなぐのではなく、SQSを間に挟むのだ。"}, {"t": 1063.797, "text": "処理が追いつかなくてもメッセージが溜まるだけで、データが消えないのだ。"}, {"t": 1069.088, "text": "SAAでは「システムが直接通信していて障害時にデータが消える問題」の"}, {"t": 1076.171, "text": "解決策としてSQSが正解になるのだー！"}, {"t": 1080.192, "text": "【エスエヌエス。SNS。】"}, {"t": 1082.933, "text": "1つのメッセージを、複数の宛先に同時に届けるサービスなのだ。"}, {"t": 1088.373, "text": "「注文が完了したら、メールにもSlackにもLambdaにも同時に通知する」"}, {"t": 1093.973, "text": "みたいな使い方ができるのだ。"}, {"t": 1096.331, "text": "SQSが「溜めて順番に処理する」のに対して、"}, {"t": 1100.853, "text": "SNSは「同時に複数に一斉送信する」のが違いなのだ。"}, {"t": 1106.56, "text": "SAAではSQSとSNSを組み合わせたFanout構成も頻出なのだー！"}, {"t": 1113.227, "text": "【キネシス。Kinesis。】"}, {"t": 1115.307, "text": "リアルタイムで大量のデータを処理するためのストリーミングサービスなのだ。"}, {"t": 1120.491, "text": "IoTセンサーのデータ、アプリのログ、クリックストリームなど、"}, {"t": 1125.504, "text": "秒間に何千件も届くデータを、リアルタイムで受け取って処理するのが得意なのだ。"}, {"t": 1131.968, "text": "SQSとの違いは「リアルタイム性」と「順序保証」なのだ。"}, {"t": 1138.357, "text": "Kinesisはデータが届いた順番を保ちながら、即座に処理できるのだ。"}, {"t": 1143.851, "text": "SAAでは「リアルタイムデータ処理」「ストリーミング分析」という"}, {"t": 1149.973, "text": "キーワードが出たらKinesisが正解なのだー！"}, {"t": 1153.643, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1153.835, "text": "第6章。セキュリティと権限管理。"}, {"t": 1157.045, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1157.429, "text": "社内の入退室管理や、決裁権限のルールを、クラウド上で実現する仕組みなのだ！"}, {"t": 1165.045, "text": "【アイアム。IAM。】"}, {"t": 1167.424, "text": "「誰が、どのAWSサービスに、何をしていいか」を管理するサービスなのだ。"}, {"t": 1174.368, "text": "AWSを使うすべての人が、最初にお世話になる門番なのだ！"}, {"t": 1180.096, "text": "【アイアムポリシー】"}, {"t": 1181.696, "text": "「EC2を起動できる」「S3のデータを読める」みたいな、"}, {"t": 1186.976, "text": "許可のルールを書いたチケットなのだ。"}, {"t": 1189.611, "text": "これを人やサーバーに渡すことで、権限を与えるのだ。"}, {"t": 1194.08, "text": "SAAでは「最小権限の原則」、つまり必要な権限だけを渡すのが絶対の正解なのだ！"}, {"t": 1202.592, "text": "【アイアムロール】"}, {"t": 1203.989, "text": "人に直接権限を渡すのではなく、"}, {"t": 1207.04, "text": "サーバーなどの「モノ」や「役割」にかぶせる帽子みたいなものなのだ。"}, {"t": 1213.803, "text": "SAAでは、EC2の中からS3にアクセスしたい時は、"}, {"t": 1219.243, "text": "パスワードを直書きするのではなく、IAMロールをEC2にアタッチするのが正解なのだ！"}, {"t": 1226.56, "text": "アクセスキーをコードに直書きするのは、絶対にNGな悪い例として出てくるのだー！"}, {"t": 1233.355, "text": "【コグニート。Cognito。】"}, {"t": 1235.691, "text": "アプリにユーザー認証機能を簡単に追加できるサービスなのだ。"}, {"t": 1240.587, "text": "「ユーザープール」と「IDプール」の2種類があるのだ。"}, {"t": 1245.824, "text": "ユーザープールはメールアドレスとパスワードでのサインアップ・サインイン機能を提供するのだ。"}, {"t": 1252.8, "text": "IDプールはGoogleやFacebookなどの外部IDと連携して、"}, {"t": 1257.792, "text": "AWSリソースへのアクセス権を一時的に付与する機能なのだ。"}, {"t": 1263.029, "text": "SAAでは「モバイルアプリにユーザー認証を追加したい」という問題で"}, {"t": 1269.227, "text": "Cognitoが正解になるのだー！"}, {"t": 1271.872, "text": "【ケーエムエス。KMS。】"}, {"t": 1274.72, "text": "AWS上のデータを暗号化するための、鍵を管理するサービスなのだ。"}, {"t": 1280.853, "text": "S3のデータ、EBSのデータ、RDSのデータなど、"}, {"t": 1286.411, "text": "あらゆるサービスのデータをKMSの鍵で暗号化できるのだ。"}, {"t": 1291.211, "text": "鍵の作成・管理・ローテーションを全部AWSが代わりにやってくれるのだ。"}, {"t": 1298.123, "text": "SAAでは「保存データを暗号化したい」という問題の正解はKMSなのだ。"}, {"t": 1305.237, "text": "「誰がいつ鍵を使ったか」という監査ログも残せるのだー！"}, {"t": 1310.059, "text": "【シークレッツマネージャー。Secrets Manager。】"}, {"t": 1313.995, "text": "データベースのパスワードやAPIキーなどの秘密情報を、"}, {"t": 1318.667, "text": "安全に保管・管理するサービスなのだ。"}, {"t": 1322.165, "text": "コードにパスワードを直書きするのは絶対NGなのだ。"}, {"t": 1326.357, "text": "Secrets Managerに預けておけば、アプリが必要な時に安全に取り出せるのだ。"}, {"t": 1332.853, "text": "さらにパスワードの自動ローテーション機能があるのが強みなのだ。"}, {"t": 1337.536, "text": "SAAでは「データベースの認証情報を安全に管理したい」という問題の"}, {"t": 1344.224, "text": "正解がSecrets Managerなのだー！"}, {"t": 1347.467, "text": "【ダブリュー・エー・エフ。AWS WAF。】"}, {"t": 1351.104, "text": "ウェブアプリケーションを、悪意ある攻撃から守るファイアウォールなのだ。"}, {"t": 1356.203, "text": "SQLインジェクションやクロスサイトスクリプティングといった"}, {"t": 1360.533, "text": "攻撃パターンを検知してブロックするのだ。"}, {"t": 1363.755, "text": "CloudFrontやELBの前に設置して使うのが基本なのだー！"}, {"t": 1369.045, "text": "【エーダブリューエス シールド。AWS Shield。】"}, {"t": 1373.888, "text": "DDoS攻撃、つまり大量のアクセスでサービスを停止させようとする攻撃を"}, {"t": 1380.512, "text": "防ぐためのサービスなのだ。"}, {"t": 1382.635, "text": "「Shield Standard」は全てのAWSユーザーに無料で自動的に適用されているのだ。"}, {"t": 1389.973, "text": "「Shield Advanced」は有料で、より高度な保護と24時間対応のサポートが受けられるのだ。"}, {"t": 1397.792, "text": "SAAでは「DDoS対策」というキーワードが出たらShieldが正解なのだー！"}, {"t": 1404.565, "text": "【ブイピーシーエンドポイント。VPCエンドポイント】"}, {"t": 1409.301, "text": "VPC内のサーバーからS3やDynamoDBにアクセスする時、"}, {"t": 1414.752, "text": "インターネットを経由せずにAWSのプライベートネットワーク内で"}, {"t": 1420.085, "text": "通信を完結させる機能なのだ。"}, {"t": 1422.869, "text": "インターネットゲートウェイもNAT Gatewayも通らないから、"}, {"t": 1426.987, "text": "セキュリティが高まり、通信コストも下がるのだ。"}, {"t": 1430.869, "text": "SAAでは「S3へのアクセスをインターネットに出したくない」という"}, {"t": 1436.971, "text": "問題の正解がVPCエンドポイントなのだー！"}, {"t": 1441.301, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1441.493, "text": "第7章。クラウドの経済性と運用管理。"}, {"t": 1445.557, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1445.941, "text": "ただシステムを作るだけじゃダメなのだ。"}, {"t": 1448.736, "text": "コストを最適化し、事業の利益に貢献してこそのアーキテクトなのだ！"}, {"t": 1454.581, "text": "【従量課金とコストモデル】"}, {"t": 1456.992, "text": "オンプレミスのように、最初に高額なサーバーを固定資産として買うのではなく、"}, {"t": 1463.211, "text": "使った分だけを毎月経費として払うモデルなのだ。"}, {"t": 1467.189, "text": "SAAでは「資本的支出から運用支出へのシフト」という言葉で表現されるのだ。"}, {"t": 1474.411, "text": "英語でCapExからOpExへ、と言うのだ。"}, {"t": 1478.304, "text": "使わないサーバーの電源を落とすだけで、即座にコスト削減になるのがクラウドの強みなのだ！"}, {"t": 1485.675, "text": "【EC2の購入オプション】"}, {"t": 1488.16, "text": "EC2にはコストを抑えるための購入オプションが複数あるのだ。"}, {"t": 1493.28, "text": "「オンデマンドインスタンス」は使った分だけ払う基本の料金体系なのだ。"}, {"t": 1499.264, "text": "「リザーブドインスタンス」は1年または3年の利用を前もって宣言することで、"}, {"t": 1505.696, "text": "最大72パーセントも安くなるのだ。"}, {"t": 1509.045, "text": "「スポットインスタンス」はAWSの余った計算資源を格安で借りられるが、"}, {"t": 1515.605, "text": "急に使えなくなることがあるため、止まっても困らないバッチ処理などに向いているのだ。"}, {"t": 1521.909, "text": "SAAでは用途に合わせて正しい購入オプションを選ぶ問題が頻出なのだー！"}, {"t": 1528.352, "text": "【オーガニゼーションズ。AWS Organizations。】"}, {"t": 1532.779, "text": "複数のAWSアカウントを一括で管理し、請求もまとめる機能なのだ。"}, {"t": 1539.445, "text": "SAAはもちろん、その先にあるプロフェッショナル試験でも超重要なのだ！"}, {"t": 1545.483, "text": "部署ごとにアカウントを分けてセキュリティを高めつつ、"}, {"t": 1549.163, "text": "支払いは本社で一括化する、みたいなガバナンスを効かせる時に使うのだー！"}, {"t": 1555.392, "text": "【クラウドウォッチ。CloudWatch。】"}, {"t": 1558.315, "text": "AWSのサービスを監視するモニタリングサービスなのだ。"}, {"t": 1562.976, "text": "EC2のCPU使用率、RDSのディスク容量、Lambdaの実行回数など、"}, {"t": 1570.411, "text": "あらゆるメトリクスを収集してグラフにしてくれるのだ。"}, {"t": 1574.283, "text": "しきい値を超えたらアラートを飛ばしたり、"}, {"t": 1577.077, "text": "オートスケーリングのトリガーにしたりできるのだ。"}, {"t": 1580.416, "text": "SAAでは「監視」「アラート」「ログ管理」の問題はCloudWatchが正解になるのだー！"}, {"t": 1588.651, "text": "【クラウドトレイル。CloudTrail。】"}, {"t": 1591.669, "text": "AWSアカウント上で「誰が・いつ・何をしたか」という操作ログを全部記録するサービスなのだ。"}, {"t": 1600.715, "text": "CloudWatchは「システムの状態の監視」、"}, {"t": 1604.235, "text": "CloudTrailは「人の操作の監査」と覚えるのだ。"}, {"t": 1608.917, "text": "不正アクセスの調査やセキュリティ監査に使うのだ。"}, {"t": 1612.672, "text": "SAAでは「誰がS3のバケットを削除したか調べたい」という問題の正解が"}, {"t": 1619.947, "text": "CloudTrailなのだー！"}, {"t": 1621.813, "text": "CloudWatchとCloudTrailは名前が似ているから、混同しないように注意なのだ！"}, {"t": 1628.245, "text": "【トラステッドアドバイザー。Trusted Advisor。】"}, {"t": 1632.277, "text": "AWSのベストプラクティスに基づいて、自分のAWS環境を自動でチェックして"}, {"t": 1639.595, "text": "改善提案をしてくれるサービスなのだ。"}, {"t": 1642.656, "text": "セキュリティ、コスト最適化、パフォーマンス、耐障害性、サービスの上限の"}, {"t": 1649.92, "text": "5つの観点でチェックしてくれるのだ。"}, {"t": 1652.725, "text": "「MFAが設定されていないアカウントがある」とか"}, {"t": 1657.141, "text": "「使っていないEC2インスタンスがコストを無駄にしている」とか"}, {"t": 1662.272, "text": "教えてくれるのだ。"}, {"t": 1663.829, "text": "SAAでは「AWS環境全体を自動でチェックしたい」という問題で登場するのだー！"}, {"t": 1671.989, "text": "【ウェルアーキテクテッドフレームワーク。Well-Architected Framework。】"}, {"t": 1678.027, "text": "AWSが定める、優れたシステム設計の指針なのだ。"}, {"t": 1683.115, "text": "6つの柱があるのだ。"}, {"t": 1685.077, "text": "「運用上の優秀性」「セキュリティ」「信頼性」「パフォーマンス効率」"}, {"t": 1691.275, "text": "「コスト最適化」「持続可能性」の6つなのだ。"}, {"t": 1695.584, "text": "SAAの試験では、この考え方に沿った選択肢が正解になることが多いのだ。"}, {"t": 1702.293, "text": "「最もコスト効率が高い」「最も可用性が高い」という問いは、"}, {"t": 1708.085, "text": "このフレームワークの考え方で選ぶのだー！"}, {"t": 1711.872, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1712.064, "text": "まとめ。SAAで絶対に覚えるべき鉄則なのだ！"}, {"t": 1716.608, "text": "━━━━━━━━━━━━━━━━━━━━"}, {"t": 1716.992, "text": "その1。高可用性を実現したいなら、マルチAZ構成なのだ！"}, {"t": 1722.997, "text": "その2。読み取り性能を上げたいなら、RDSはリードレプリカ、"}, {"t": 1728.64, "text": "DynamoDBはDAX、MySQLより高性能ならAuroraなのだ！"}, {"t": 1735.221, "text": "その3。サーバーを管理したくないなら、Lambdaのサーバーレスなのだ！"}, {"t": 1740.907, "text": "その4。権限管理は必ずIAMロールを使い、アクセスキーの直書きは絶対NGなのだ！"}, {"t": 1749.323, "text": "その5。システムを疎結合にするならSQSでキューを挟むのだ！"}, {"t": 1754.592, "text": "リアルタイム処理が必要ならKinesisなのだ！"}, {"t": 1758.069, "text": "その6。世界中に速く届けたいならCloudFrontとエッジロケーションなのだ！"}, {"t": 1764.395, "text": "その7。コスト最適化は、使い方に合わせてEC2の購入オプションを選ぶのだ！"}, {"t": 1771.627, "text": "その8。暗号化はKMS、パスワード管理はSecrets Manager、"}, {"t": 1777.984, "text": "ユーザー認証はCognito、DDoS対策はShieldなのだ！"}, {"t": 1783.264, "text": "その9。監視はCloudWatch、操作ログの監査はCloudTrail。"}, {"t": 1789.035, "text": "名前は似てるけど役割は全然違うのだ！"}, {"t": 1792.757, "text": "その10。プライベートからS3へのアクセスはVPCエンドポイント、"}, {"t": 1798.699, "text": "複数VPCの接続はTransit Gateway、"}, {"t": 1802.603, "text": "オンプレとの専用線接続はDirect Connectなのだ！"}, {"t": 1807.019, "text": "これで全項目、コンプリートなのだ！"}, {"t": 1810.176, "text": "何度も聞いて、AWSの全体像を頭に描くのだー！"}, {"t": 1815.413, "text": "試験会場で「ずんだもんが言ってた！」って思い出してほしいのだ！"}, {"t": 1820.747, "text": "絶対合格なのだー！！"}];
const lyricText = document.getElementById('lyric-text');
let lastCueIdx = -1;

function getCueIdx(currentTime) {
  // 現在時刻以下で最大のcueを探す（二分探索）
  let lo = 0, hi = CUES.length - 1, result = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (CUES[mid].t <= currentTime) {
      result = mid;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  return result;
}

function updateLyric() {
  if (!audio.duration || !isFinite(audio.duration)) return;
  const idx = getCueIdx(audio.currentTime);
  if (idx === lastCueIdx) return;
  lastCueIdx = idx;
  if (idx < 0) {
    lyricText.textContent = '再生すると表示されます';
    lyricText.classList.add('placeholder');
  } else {
    lyricText.textContent = CUES[idx].text;
    lyricText.classList.remove('placeholder');
  }
}

audio.addEventListener('timeupdate', updateLyric);
audio.addEventListener('seeked', updateLyric);
// ---- Helpers ----
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}
</script>
